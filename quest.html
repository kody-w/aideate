<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIdeate Workshop — Training Quest</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext y='26' font-size='28'%3E💡%3C/text%3E%3C/svg%3E">
<script>
(function(){
  try {
    var saved = localStorage.getItem('aideate-quest-theme');
    var prefersLight = window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches;
    var theme = saved || (prefersLight ? 'light' : 'dark');
    if (theme === 'light') document.documentElement.setAttribute('data-theme', 'light');
  } catch(e){}
})();
</script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ═══════════════════════════════════════
   DARK THEME (default)
   ═══════════════════════════════════════ */
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;--border2:#21262d;
  --text:#e6edf3;--text-dim:#8b949e;--muted:#484f58;
  --accent:#58a6ff;--green:#3fb950;--green-2:#2ea043;--purple:#a78bfa;--purple-2:#8b5cf6;
  --orange:#f0883e;--yellow:#e3b341;--red:#f85149;
  --chrome-bg:rgba(22,27,34,.92);
  --grad-1:#7df0c8;--grad-2:#58a6ff;--grad-3:#a78bfa;
  --tint-green:rgba(63,185,80,.08);--tint-purple:rgba(139,92,246,.08);
  --node-bg:#161b22;--node-border:#30363d;
  --panel-bg:#161b22;--panel-border:#30363d;
  --copy-bg:#0d1117;
  --panel-w:500px;--top-bar:56px;--node-size:72px
}

/* ═══════════════════════════════════════
   LIGHT THEME
   ═══════════════════════════════════════ */
[data-theme="light"]{
  --bg:#ffffff;--surface:#f6f8fa;--surface2:#eaeef2;--border:#d0d7de;--border2:#afb8c1;
  --text:#1f2328;--text-dim:#59636e;--muted:#8c959f;
  --accent:#0969da;--green:#1a7f37;--green-2:#2da44e;--purple:#8250df;--purple-2:#6639ba;
  --orange:#bc4c00;--yellow:#9a6700;--red:#cf222e;
  --chrome-bg:rgba(255,255,255,.88);
  --grad-1:#2da44e;--grad-2:#0969da;--grad-3:#8250df;
  --tint-green:rgba(26,127,55,.08);--tint-purple:rgba(130,80,223,.08);
  --node-bg:#f6f8fa;--node-border:#d0d7de;
  --panel-bg:#ffffff;--panel-border:#d0d7de;
  --copy-bg:#f6f8fa
}

html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bg);color:var(--text);line-height:1.55;transition:background-color .25s,color .25s}

/* ═══════════════════════════════════════
   THEME TOGGLE
   ═══════════════════════════════════════ */
.theme-toggle{position:fixed;top:14px;left:18px;z-index:150;display:inline-flex;align-items:center;justify-content:center;width:38px;height:38px;padding:0;background:var(--chrome-bg);backdrop-filter:blur(12px);border:1px solid var(--border);border-radius:50%;color:var(--text-dim);cursor:pointer;font-size:1rem;transition:all .15s;line-height:1}
.theme-toggle:hover{color:var(--text);border-color:var(--accent);transform:translateY(-1px)}
.theme-toggle .sun{display:none}
.theme-toggle .moon{display:inline}
[data-theme="light"] .theme-toggle .sun{display:inline}
[data-theme="light"] .theme-toggle .moon{display:none}

/* ═══════════════════════════════════════
   TOP BAR
   ═══════════════════════════════════════ */
.top-bar{position:fixed;top:0;left:0;right:0;height:var(--top-bar);background:var(--chrome-bg);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 28px 0 68px;z-index:100;gap:16px}
.top-bar .title{font-size:17px;font-weight:700;white-space:nowrap;letter-spacing:-.2px}
.top-bar .title span{background:linear-gradient(135deg,var(--grad-1),var(--grad-2),var(--grad-3));-webkit-background-clip:text;background-clip:text;color:transparent}
.progress-wrap{flex:1;max-width:520px;margin:0 auto;display:flex;align-items:center;gap:12px}
.progress-track{flex:1;height:10px;background:var(--surface2);border-radius:5px;overflow:hidden;display:flex;gap:2px}
.phase-segment{height:100%;border-radius:4px;transition:all .6s cubic-bezier(.4,0,.2,1);min-width:2px}
.phase-segment.p1{background:linear-gradient(90deg,var(--accent),var(--green))}
.phase-segment.p2{background:linear-gradient(90deg,var(--green),var(--green-2))}
.phase-segment.p3{background:linear-gradient(90deg,var(--purple),var(--purple-2))}
.phase-segment.p4{background:linear-gradient(90deg,var(--orange),var(--yellow))}
.phase-segment.empty{background:transparent}
.progress-label{font-size:14px;font-weight:600;color:var(--text-dim);min-width:90px;text-align:right;font-variant-numeric:tabular-nums}
.btn-reset{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:500;white-space:nowrap;transition:all .2s}.btn-reset:hover{border-color:var(--red);color:var(--red)}

/* ═══════════════════════════════════════
   QUEST MAP
   ═══════════════════════════════════════ */
.quest-map{position:fixed;top:var(--top-bar);left:0;right:0;bottom:0;overflow:hidden}
.quest-map svg.path-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}

/* Phase labels */
.phase-label{position:absolute;font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--text-dim);opacity:.45;pointer-events:none}
.phase-label.p1{top:82px;left:1%}.phase-label.p2{top:82px;left:23.2%}.phase-label.p3{top:82px;left:45.4%}.phase-label.p4{top:82px;left:67.7%}
.phase-divider{position:absolute;top:var(--top-bar);bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(--border) 15%,var(--border) 85%,transparent);opacity:.4;pointer-events:none}
.phase-divider.d1{left:22.2%}.phase-divider.d2{left:44.4%}.phase-divider.d3{left:66.7%}

/* ═══════════════════════════════════════
   NODES (72px, screenshare-friendly)
   ═══════════════════════════════════════ */
.node{position:absolute;width:var(--node-size);height:var(--node-size);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);z-index:10;transform:translate(-50%,-50%)}
.node .ring{position:absolute;inset:-5px;border-radius:50%;border:2.5px solid var(--node-border);transition:all .35s}
.node .inner{width:100%;height:100%;border-radius:50%;background:var(--node-bg);display:flex;align-items:center;justify-content:center;font-size:26px;position:relative;z-index:1;transition:all .35s;border:2.5px solid var(--node-border)}
.node.active .ring{border-color:var(--accent);box-shadow:0 0 24px rgba(88,166,255,.4);animation:pulse-ring 2s infinite}
.node.active .inner{border-color:var(--accent);background:rgba(88,166,255,.12);transform:scale(1.15)}.node.active .lock{display:none}
.node.complete .ring{border-color:var(--green);box-shadow:0 0 16px rgba(63,185,80,.3)}
.node.complete .inner{border-color:var(--green);background:rgba(63,185,80,.12)}.node.complete .lock{display:none}
.node:hover{transform:translate(-50%,-50%) scale(1.12)}
.node .label{position:absolute;top:calc(100% + 12px);white-space:nowrap;font-size:13px;font-weight:600;color:var(--text-dim);text-align:center;pointer-events:none;transition:color .3s}
.node.active .label{color:var(--accent)}.node.complete .label{color:var(--green)}
@keyframes pulse-ring{0%,100%{box-shadow:0 0 20px rgba(88,166,255,.3)}50%{box-shadow:0 0 36px rgba(88,166,255,.55)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.check-icon{display:none}.node.complete .check-icon{display:block}.node.complete .emoji{display:none}

/* ═══════════════════════════════════════
   OVERLAY + PANEL (polished, bigger text)
   ═══════════════════════════════════════ */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}.overlay.open{opacity:1;pointer-events:auto}
.panel{position:fixed;top:0;right:0;bottom:0;width:var(--panel-w);max-width:92vw;background:var(--panel-bg);border-left:1px solid var(--panel-border);z-index:210;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow-y:auto;box-shadow:-8px 0 32px rgba(0,0,0,.15)}.panel.open{transform:translateX(0)}
.panel-header{padding:24px 28px 20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:14px;background:linear-gradient(135deg,var(--tint-green),var(--tint-purple))}
.panel-header .emoji-big{font-size:40px;line-height:1}.panel-header .meta{flex:1}.panel-header .meta h2{font-size:22px;font-weight:700;margin-bottom:6px;color:var(--text);letter-spacing:-.2px}.panel-header .meta .time{font-size:13px;color:var(--text-dim);font-weight:500}
.panel-close{background:none;border:none;color:var(--text-dim);font-size:24px;cursor:pointer;padding:4px;line-height:1;transition:color .15s}.panel-close:hover{color:var(--text)}
.panel-body{flex:1;padding:24px 28px;display:flex;flex-direction:column;gap:18px}
.panel-body .desc{font-size:16px;line-height:1.65;color:var(--text-dim)}
.copy-block{position:relative;background:var(--copy-bg);border:1px solid var(--border);border-radius:10px;padding:14px 48px 14px 16px;font-family:'SF Mono','Cascadia Code','Fira Code',ui-monospace,monospace;font-size:13.5px;line-height:1.55;color:var(--text);white-space:pre-wrap;word-break:break-word}
.copy-btn{position:absolute;top:10px;right:10px;background:var(--surface2);border:none;color:var(--text-dim);width:32px;height:32px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:14px}.copy-btn:hover{background:var(--accent);color:#fff}.copy-btn.copied{background:var(--green);color:#fff}
.toggle-done{display:flex;align-items:center;gap:12px;padding:14px 18px;border-radius:10px;border:2px solid var(--border);background:transparent;cursor:pointer;font-size:15px;font-weight:600;color:var(--text);transition:all .25s;width:100%}
.toggle-done .dot{width:24px;height:24px;border-radius:50%;border:2.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
.toggle-done.checked{border-color:var(--green);background:var(--tint-green)}.toggle-done.checked .dot{background:var(--green);border-color:var(--green)}
.substeps{list-style:none;padding:0;display:flex;flex-direction:column;gap:8px}
.substeps li{font-size:14px;color:var(--text-dim);padding-left:22px;position:relative;line-height:1.55}
.substeps li::before{content:'';position:absolute;left:2px;top:8px;width:9px;height:9px;border-radius:50%;border:2px solid var(--border)}
.stuck-toggle{background:none;border:none;color:var(--orange);font-size:14px;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:8px;font-weight:500}.stuck-toggle:hover{text-decoration:underline}
.stuck-content{max-height:0;overflow:hidden;transition:max-height .3s;font-size:14px;color:var(--text-dim);line-height:1.65}.stuck-content.open{max-height:500px}.stuck-content p{margin-top:8px}
.copy-group{display:flex;flex-direction:column;gap:10px}

/* RAR / Agent Library Cards */
.rar-card{display:flex;align-items:center;gap:14px;padding:14px 18px;border-radius:12px;background:linear-gradient(135deg,var(--tint-purple),var(--tint-green));border:1px solid var(--purple);text-decoration:none;transition:all .2s;cursor:pointer;margin-top:4px}
.rar-card:hover{border-color:var(--accent);background:linear-gradient(135deg,rgba(139,92,246,.16),rgba(63,185,80,.16));transform:translateY(-2px);box-shadow:0 6px 16px rgba(139,92,246,.15)}
.rar-card-icon{width:44px;height:44px;border-radius:10px;background:linear-gradient(135deg,var(--grad-2),var(--grad-3));display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.rar-card-info{display:flex;flex-direction:column;gap:3px;min-width:0}
.rar-card-label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.rar-card-name{font-size:15px;color:var(--text);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rar-card-arrow{margin-left:auto;color:var(--text-dim);font-size:20px;flex-shrink:0}

/* ═══════════════════════════════════════
   CELEBRATIONS
   ═══════════════════════════════════════ */
.particle{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:999}
.confetti{position:fixed;width:10px;height:16px;pointer-events:none;z-index:999;border-radius:2px}
.rocket-anim{position:fixed;font-size:44px;z-index:999;pointer-events:none}
.banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--chrome-bg);backdrop-filter:blur(16px);border:2px solid var(--green);border-radius:20px;padding:36px 60px;text-align:center;z-index:999;transition:transform .5s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 16px 56px rgba(0,0,0,.25)}.banner.show{transform:translate(-50%,-50%) scale(1)}.banner h1{font-size:32px;margin-bottom:10px;color:var(--text)}.banner p{color:var(--text-dim);font-size:16px}
.panel::-webkit-scrollbar{width:6px}.panel::-webkit-scrollbar-track{background:transparent}.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.credit{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:12px;color:var(--muted);opacity:.5;pointer-events:none;letter-spacing:.3px;z-index:5}

/* ═══════════════════════════════════════
   MOBILE
   ═══════════════════════════════════════ */
@media(max-width:768px){
  html,body{overflow:auto;height:auto}
  .top-bar{padding:0 14px 0 56px;height:52px}
  .top-bar .title{font-size:14px}
  .progress-wrap{max-width:none;gap:8px}
  .progress-label{min-width:60px;font-size:13px}
  .btn-reset{padding:5px 10px;font-size:12px}
  :root{--top-bar:52px;--node-size:56px}
  .quest-map,.phase-label,.phase-divider,.path-svg{display:none!important}
  #mobileList{display:flex;flex-direction:column;padding:64px 18px 80px;gap:0}
  .m-phase-header{font-size:15px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-dim);padding:24px 0 12px;opacity:.7}
  .m-phase-header:first-child{padding-top:0}
  .m-item{display:flex;align-items:center;gap:16px;padding:16px 0;position:relative;cursor:pointer}
  .m-item::before{content:'';position:absolute;left:28px;top:0;bottom:0;width:2px;background:var(--border);z-index:0}
  .m-item:last-child::before{bottom:50%}
  .m-phase-header+.m-item::before{top:50%}
  .m-node{width:56px;height:56px;border-radius:50%;background:var(--node-bg);border:2.5px solid var(--node-border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;position:relative;z-index:1;transition:all .3s}
  .m-item.complete .m-node{border-color:var(--green);background:rgba(63,185,80,.12)}
  .m-item.active .m-node{border-color:var(--accent);background:rgba(88,166,255,.12);box-shadow:0 0 14px rgba(88,166,255,.35)}
  .m-item.locked .m-node{opacity:.45}
  .m-text{flex:1;min-width:0}
  .m-text .m-title{font-size:16px;font-weight:600;color:var(--text)}
  .m-item.complete .m-title{color:var(--green)}
  .m-item.active .m-title{color:var(--accent)}
  .m-item.locked .m-title{color:var(--muted)}
  .m-text .m-time{font-size:13px;color:var(--text-dim)}
  .m-check{color:var(--green);font-size:20px;flex-shrink:0;opacity:0;transition:opacity .3s}
  .m-item.complete .m-check{opacity:1}
  .panel{width:100%;max-width:100%;border-left:none;border-radius:20px 20px 0 0;top:auto;bottom:0;max-height:88vh;transform:translateY(100%);box-shadow:0 -6px 32px rgba(0,0,0,.18)}.panel.open{transform:translateY(0)}
  .panel-header{padding:20px}.panel-body{padding:20px;gap:14px}
  .banner{padding:24px 28px}.banner h1{font-size:24px}.banner p{font-size:14px}
  .credit{position:relative;padding:24px 0;text-align:center;opacity:.5}
  .theme-toggle{top:10px;left:10px;width:34px;height:34px;font-size:.9rem}
}
@media(min-width:769px){
  #mobileList{display:none}
}
</style>
</head>
<body>

<button class="theme-toggle" id="themeToggle" onclick="toggleTheme()" aria-label="Toggle light/dark mode" title="Toggle light/dark mode">
  <span class="moon">🌙</span><span class="sun">☀️</span>
</button>

<div class="top-bar">
  <div class="title"><span>AIdeate Workshop</span> — Training Quest</div>
  <div class="progress-wrap">
    <div class="progress-track" id="progressTrack">
      <div class="phase-segment p1" id="seg1" style="width:0%"></div>
      <div class="phase-segment p2" id="seg2" style="width:0%"></div>
      <div class="phase-segment p3" id="seg3" style="width:0%"></div>
      <div class="phase-segment p4" id="seg4" style="width:0%"></div>
    </div>
    <div class="progress-label" id="progressLabel">0 of 18</div>
  </div>
  <div id="progressFill" style="display:none"></div>
  <button class="btn-reset" onclick="resetProgress()">Reset</button>
</div>

<div class="phase-label p1">🚀 Setup</div>
<div class="phase-label p2">🏢 Workshop Prep</div>
<div class="phase-label p3">💡 Ideation</div>
<div class="phase-label p4">📊 Evaluate & Export</div>
<div class="phase-divider d1"></div><div class="phase-divider d2"></div><div class="phase-divider d3"></div>

<div class="quest-map" id="questMap"><svg class="path-svg" id="pathSvg" preserveAspectRatio="none"></svg></div>
<div id="mobileList"></div>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-header">
    <div class="emoji-big" id="panelEmoji"></div>
    <div class="meta"><h2 id="panelTitle"></h2><div class="time" id="panelTime"></div></div>

</div>

<div class="banner" id="banner"><h1>🏆 Quest Complete!</h1><p>You are now an AI Workshop Facilitator.<br>Go run your first customer workshop.</p></div>
<div class="credit">AIdeate Workshop — Training Quest · Built with 🔥 by BlazingBeard</div>

<script>
/* ═══════════════════════════════════════
   THEME
   ═══════════════════════════════════════ */
function toggleTheme(){
  const isLight = document.documentElement.getAttribute('data-theme') === 'light';
  if(isLight){document.documentElement.removeAttribute('data-theme');localStorage.setItem('aideate-quest-theme','dark')}
  else{document.documentElement.setAttribute('data-theme','light');localStorage.setItem('aideate-quest-theme','light')}
}

/* ═══════════════════════════════════════
   CHECKPOINT DATA
   ═══════════════════════════════════════ */

const STORAGE_KEY = 'quest-' + btoa('AIdeate Workshop').slice(0,12);
const PHASE_LABELS = ["🚀 Setup", "🏢 Workshop Prep", "💡 Ideation", "📊 Evaluate & Export"];
let state = loadState();

function isMobile(){return window.innerWidth<=768}
function loadState(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s)}catch(e){}return{completed:{}}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function isComplete(id){return !!state.completed[id]}
function completedCount(){return CHECKPOINTS.filter(c=>isComplete(c.id)).length}
function render(){renderPath();renderNodes();updateProgress()}

/* ═══════════════════════════════════════
   SEGMENTED PROGRESS BAR
   ═══════════════════════════════════════ */
function updateProgress(){
  const n=completedCount(),t=CHECKPOINTS.length;
  document.getElementById('progressLabel').textContent=n+' of '+t;
  // Update per-phase segments
  for(let p=1;p<=4;p++){
    const phaseItems=CHECKPOINTS.filter(c=>c.phase===p);
    const pDone=phaseItems.filter(c=>isComplete(c.id)).length;
    const pct=(pDone/phaseItems.length)*100;
    const seg=document.getElementById('seg'+p);
    if(seg){
      // Each segment gets proportional width of the total bar
      const segWidth=(phaseItems.length/t)*100;
      seg.style.width=((pct/100)*segWidth)+'%';
      seg.classList.toggle('empty',pct===0);
    }
  }
}

function getActiveIndex(){for(let i=0;i<CHECKPOINTS.length;i++){if(!isComplete(CHECKPOINTS[i].id))return i}return CHECKPOINTS.length}

/* ═══════════════════════════════════════
   PATH RENDERING
   ═══════════════════════════════════════ */
function renderPath(){
  if(isMobile()){document.getElementById('pathSvg').innerHTML='';return}
  const svg=document.getElementById('pathSvg'),w=window.innerWidth,h=window.innerHeight-56;
  svg.setAttribute('viewBox','0 0 '+w+' '+h);let html='';
  const pts=POSITIONS.map(p=>({x:p.x/100*w,y:p.y/100*h}));
  const ai=getActiveIndex();
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1],cx1=a.x+(b.x-a.x)*.6,cy1=a.y,cx2=a.x+(b.x-a.x)*.4,cy2=b.y;
    const d='M'+a.x+','+a.y+' C'+cx1+','+cy1+' '+cx2+','+cy2+' '+b.x+','+b.y;
    const done=isComplete(CHECKPOINTS[i].id)&&isComplete(CHECKPOINTS[i+1].id);
    const partial=isComplete(CHECKPOINTS[i].id)&&!isComplete(CHECKPOINTS[i+1].id);
    const active=i===ai-1||i===ai;
    if(done)html+='<path d="'+d+'" fill="none" stroke="var(--green)" stroke-width="3" stroke-opacity=".5"/>';
    else if(partial||active)html+='<path d="'+d+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-opacity=".45" stroke-dasharray="8 6"><animate attributeName="stroke-dashoffset" from="28" to="0" dur="1.5s" repeatCount="indefinite"/></path>';
    else html+='<path d="'+d+'" fill="none" stroke="var(--border)" stroke-width="2" stroke-dasharray="6 8" stroke-opacity=".4"/>';
  }
  svg.innerHTML=html;
}

/* ═══════════════════════════════════════
   DESKTOP NODES
   ═══════════════════════════════════════ */
function renderNodes(){
  if(isMobile()){renderMobileList();return}
  document.querySelectorAll('.node').forEach(n=>n.remove());
  const map=document.getElementById('questMap'),ai=getActiveIndex();
  CHECKPOINTS.forEach((cp,i)=>{
    const pos=POSITIONS[i];if(!pos)return;
    const node=document.createElement('div');
    node.className='node';
    if(isComplete(cp.id))node.classList.add('complete');
    else if(i===ai)node.classList.add('active');
    node.style.left=pos.x+'%';node.style.top='calc('+pos.y+'% + 0px)';
    const isLocked=i>ai&&!isComplete(cp.id);
    node.innerHTML='<div class="ring"></div><div class="inner"><span class="emoji">'+(isLocked?'🔒':cp.emoji)+'</span><svg class="check-icon" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><polyline points="4 12 10 18 20 6"/></svg>'+(isLocked?'<span class="lock"></span>':'')+'</div><div class="label">'+cp.title+'</div>';
    node.addEventListener('click',()=>openPanel(i));
    map.appendChild(node);
  });
}

/* ═══════════════════════════════════════
   MOBILE LIST
   ═══════════════════════════════════════ */
function renderMobileList(){
  const list=document.getElementById('mobileList');list.innerHTML='';
  const ai=getActiveIndex();let lastPhase=0;
  CHECKPOINTS.forEach((cp,i)=>{
    if(cp.phase!==lastPhase){
      lastPhase=cp.phase;
      const hdr=document.createElement('div');hdr.className='m-phase-header';
      hdr.textContent=PHASE_LABELS[cp.phase-1]||'Phase '+cp.phase;
      list.appendChild(hdr);
    }
    const item=document.createElement('div');item.className='m-item';
    if(isComplete(cp.id))item.classList.add('complete');
    else if(i===ai)item.classList.add('active');
    else if(i>ai)item.classList.add('locked');
    const isLocked=i>ai&&!isComplete(cp.id);
    item.innerHTML='<div class="m-node">'+(isComplete(cp.id)?'<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round"><polyline points="4 12 10 18 20 6"/></svg>':(isLocked?'🔒':cp.emoji))+'</div><div class="m-text"><div class="m-title">'+cp.title+'</div><div class="m-time">'+(cp.time?'⏱ '+cp.time:'')+'</div></div>';
    item.addEventListener('click',()=>openPanel(i));
    list.appendChild(item);
  });
}

/* ═══════════════════════════════════════
   PANEL
   ═══════════════════════════════════════ */
let currentPanel=-1;
function openPanel(idx){
  currentPanel=idx;const cp=CHECKPOINTS[idx];
  document.getElementById('panelEmoji').textContent=cp.emoji;
  document.getElementById('panelTitle').textContent=cp.title;
  document.getElementById('panelTime').textContent=cp.time?'⏱ '+cp.time:'';
  let html='<div class="desc">'+cp.desc+'</div>';
  if(cp.substeps){html+='<ol class="substeps">';cp.substeps.forEach(s=>html+='<li>'+s+'</li>');html+='</ol>'}
  if(cp.copies){
    html+='<div class="copy-group">';
    cp.copies.forEach(c=>{html+='<div><div style="font-size:13px;color:var(--text-dim);margin-bottom:5px;font-weight:500">'+c.label+'</div><div class="copy-block"><span class="copy-text">'+escHtml(c.text)+'</span><button class="copy-btn" onclick="copyText(this,\''+escAttr(c.text)+'\')" title="Copy">📋</button></div></div>'});
    html+='</div>';
  }
  if(cp.learn){html+='<div style="font-size:14px;color:var(--text-dim);padding:12px 14px;background:var(--tint-green);border:1px solid var(--green);border-radius:10px">📚 <b style="color:var(--green)">What you learn:</b> '+cp.learn+'</div>'}
  if(cp.rar_url){html+='<a href="'+cp.rar_url+'" target="_blank" rel="noopener" class="rar-card"><div class="rar-card-icon">🧩</div><div class="rar-card-info"><div class="rar-card-label">Resource Library</div><div class="rar-card-name">'+escHtml(cp.rar_name)+'</div></div><div class="rar-card-arrow">→</div></a>'}
  const checked=isComplete(cp.id);
  html+='<button class="toggle-done '+(checked?'checked':'')+'" onclick="toggleDone(\''+cp.id+'\',this)"><span class="dot">'+(checked?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><polyline points="4 12 10 18 20 6"/></svg>':'')+'</span><span>'+(cp.toggle||'Done ✓')+'</span></button>';
  if(cp.stuck){html+='<div><button class="stuck-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">🆘 I\'m stuck</button><div class="stuck-content"><p>'+cp.stuck+'</p></div></div>'}
  document.getElementById('panelBody').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}

function closePanel(){document.getElementById('overlay').classList.remove('open');document.getElementById('panel').classList.remove('open');currentPanel=-1}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

function copyText(btn,text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied');btn.textContent='✓';
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋'},1500);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    btn.classList.add('copied');btn.textContent='✓';
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋'},1500);
  });
}

function toggleDone(id,btn){
  if(isComplete(id)){delete state.completed[id];btn.classList.remove('checked');btn.querySelector('.dot').innerHTML=''}
  else{state.completed[id]=true;btn.classList.add('checked');btn.querySelector('.dot').innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><polyline points="4 12 10 18 20 6"/></svg>';celebrate(id)}
  saveState();render();
}

/* ═══════════════════════════════════════
   CELEBRATIONS
   ═══════════════════════════════════════ */
function celebrate(id){
  const idx=CHECKPOINTS.findIndex(c=>c.id===id);let x,y;
  if(isMobile()){const items=document.querySelectorAll('.m-item');if(items[idx]){const r=items[idx].getBoundingClientRect();x=r.left+r.width/2;y=r.top+r.height/2}else return}
  else{const pos=POSITIONS[idx];if(!pos)return;x=pos.x/100*window.innerWidth;y=pos.y/100*(window.innerHeight-56)+56}
  spawnParticles(x,y,14);
  for(let p=1;p<=4;p++){const phase=CHECKPOINTS.filter(c=>c.phase===p);if(phase.every(c=>isComplete(c.id))&&id===phase[phase.length-1].id)setTimeout(()=>rocketAnimation(),400)}
  if(completedCount()===CHECKPOINTS.length)setTimeout(()=>{confettiExplosion();showBanner()},600);
}

function spawnParticles(cx,cy,count){
  const colors=['var(--accent)','var(--green)','var(--orange)','var(--purple)','var(--yellow)'];
  const rawColors=['#58a6ff','#3fb950','#f0883e','#a78bfa','#e3b341'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');el.className='particle';
    el.style.left=cx+'px';el.style.top=cy+'px';el.style.background=rawColors[i%rawColors.length];
    document.body.appendChild(el);
    const angle=Math.random()*Math.PI*2,dist=45+Math.random()*70,dx=Math.cos(angle)*dist,dy=Math.sin(angle)*dist;
    el.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:'translate('+dx+'px,'+dy+'px) scale(0)',opacity:0}],{duration:600+Math.random()*400,easing:'cubic-bezier(.4,0,.2,1)'}).onfinish=()=>el.remove();
  }
}

function rocketAnimation(){
  const el=document.createElement('div');el.className='rocket-anim';el.textContent='🚀';
  el.style.left='-50px';el.style.bottom='60%';document.body.appendChild(el);
  el.animate([{transform:'translate(0,0) rotate(-30deg)',opacity:1},{transform:'translate('+(window.innerWidth+100)+'px,-'+(window.innerHeight/2)+'px) rotate(-30deg)',opacity:.8}],{duration:1400,easing:'cubic-bezier(.25,.1,.25,1)'}).onfinish=()=>el.remove();
}

function confettiExplosion(){
  const colors=['#58a6ff','#3fb950','#f0883e','#a78bfa','#e3b341','#f85149','#fff'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');el.className='confetti';
    el.style.background=colors[i%colors.length];el.style.left=Math.random()*window.innerWidth+'px';el.style.top='-20px';
    el.style.width=(6+Math.random()*8)+'px';el.style.height=(10+Math.random()*12)+'px';
    el.style.borderRadius=Math.random()>.5?'50%':'2px';document.body.appendChild(el);
    const x=(Math.random()-.5)*200,spin=Math.random()*720-360;
    el.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:'translate('+x+'px,'+(window.innerHeight+40)+'px) rotate('+spin+'deg)',opacity:.6}],{duration:2000+Math.random()*1500,easing:'cubic-bezier(.25,.1,.25,1)',delay:Math.random()*300}).onfinish=()=>el.remove();
  }
}

function showBanner(){const b=document.getElementById('banner');b.classList.add('show');setTimeout(()=>b.classList.remove('show'),4000)}
function resetProgress(){if(!confirm('Reset all progress? This cannot be undone.'))return;state={completed:{}};saveState();closePanel();render()}

render();
window.addEventListener('resize',()=>render());
</script>
</body>
