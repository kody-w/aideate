<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIdeate Workshop — Training Quest</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#eaecf0;--bg2:#f4f5f7;--blue:#0969da;--green:#1a7f37;--orange:#bf8700;--red:#cf222e;--text:#24292f;--text-muted:#57606a;--border:#c5ccd6;--panel-w:460px;--top-bar:52px}
  html,body{height:100%;overflow:hidden;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#dfe2e6 0%,var(--bg) 100%);color:var(--text)}
  .top-bar{position:fixed;top:0;left:0;right:0;height:var(--top-bar);background:rgba(234,236,240,.94);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;z-index:100}
  .top-bar .title{font-size:15px;font-weight:600;white-space:nowrap}.top-bar .title span{color:var(--blue)}
  .progress-wrap{flex:1;max-width:420px;margin:0 auto;display:flex;align-items:center;gap:10px}
  .progress-track{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1)}
  .progress-label{font-size:13px;color:var(--text-muted);min-width:90px;text-align:right}
  .btn-reset{background:transparent;border:1px solid var(--border);color:var(--text-muted);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:12px;white-space:nowrap;transition:all .2s}.btn-reset:hover{border-color:var(--red);color:var(--red)}
  .quest-map{position:fixed;top:var(--top-bar);left:0;right:0;bottom:0;overflow:hidden}
  .quest-map svg.path-svg{position:absolute;inset:0;width:100%;height:100%;pointer-events:none}
  .phase-label{position:absolute;font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:3px;color:var(--text-muted);opacity:.55;pointer-events:none}
  .phase-label.p1{top:82px;left:1%}.phase-label.p2{top:82px;left:23.2%}.phase-label.p3{top:82px;left:45.4%}.phase-label.p4{top:82px;left:67.7%}
  .phase-divider{position:absolute;top:var(--top-bar);bottom:0;width:1px;background:linear-gradient(to bottom,transparent,var(--border) 15%,var(--border) 85%,transparent);opacity:.6;pointer-events:none}
  .phase-divider.d1{left:22.2%}.phase-divider.d2{left:44.4%}.phase-divider.d3{left:66.7%}
  .node{position:absolute;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .35s cubic-bezier(.4,0,.2,1);z-index:10;transform:translate(-50%,-50%)}
  .node .ring{position:absolute;inset:-4px;border-radius:50%;border:2px solid var(--border);transition:all .35s}
  .node .inner{width:100%;height:100%;border-radius:50%;background:#f0f1f3;display:flex;align-items:center;justify-content:center;font-size:22px;position:relative;z-index:1;transition:all .35s;border:2px solid var(--border)}
  .node.active .ring{border-color:var(--blue);box-shadow:0 0 20px rgba(88,166,255,.35);animation:pulse-ring 2s infinite}
  .node.active .inner{border-color:var(--blue);background:rgba(88,166,255,.1);transform:scale(1.12)}.node.active .lock{display:none}
  .node.complete .ring{border-color:var(--green);box-shadow:0 0 12px rgba(63,185,80,.25)}
  .node.complete .inner{border-color:var(--green);background:rgba(63,185,80,.15)}.node.complete .lock{display:none}
  .node:hover{transform:translate(-50%,-50%) scale(1.1)}
  .node .label{position:absolute;top:calc(100% + 10px);white-space:nowrap;font-size:11px;font-weight:600;color:var(--text-muted);text-align:center;pointer-events:none;transition:color .3s}
  .node.active .label{color:var(--blue)}.node.complete .label{color:var(--green)}
  @keyframes pulse-ring{0%,100%{box-shadow:0 0 20px rgba(88,166,255,.25)}50%{box-shadow:0 0 32px rgba(88,166,255,.5)}}
  .check-icon{display:none}.node.complete .check-icon{display:block}.node.complete .emoji{display:none}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.2);z-index:200;opacity:0;pointer-events:none;transition:opacity .3s}.overlay.open{opacity:1;pointer-events:auto}
  .panel{position:fixed;top:0;right:0;bottom:0;width:var(--panel-w);max-width:92vw;background:#f0f1f3;border-left:1px solid var(--border);z-index:210;transform:translateX(100%);transition:transform .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;overflow-y:auto;box-shadow:-4px 0 24px rgba(0,0,0,.08)}.panel.open{transform:translateX(0)}
  .panel-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
  .panel-header .emoji-big{font-size:32px;line-height:1}.panel-header .meta{flex:1}.panel-header .meta h2{font-size:18px;font-weight:700;margin-bottom:4px}.panel-header .meta .time{font-size:12px;color:var(--text-muted)}
  .panel-close{background:none;border:none;color:var(--text-muted);font-size:22px;cursor:pointer;padding:4px;line-height:1}.panel-close:hover{color:var(--text)}
  .panel-body{flex:1;padding:20px 24px;display:flex;flex-direction:column;gap:16px}.panel-body .desc{font-size:14px;line-height:1.55;color:var(--text)}
  .copy-block{position:relative;background:#e4e6ea;border:1px solid var(--border);border-radius:8px;padding:12px 44px 12px 14px;font-family:'Cascadia Code','Fira Code',monospace;font-size:12.5px;line-height:1.5;color:var(--text);white-space:pre-wrap;word-break:break-word}
  .copy-btn{position:absolute;top:8px;right:8px;background:#d5d8dd;border:none;color:var(--text-muted);width:30px;height:30px;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}.copy-btn:hover{background:var(--blue);color:#fff}.copy-btn.copied{background:var(--green);color:#fff}
  .toggle-done{display:flex;align-items:center;gap:10px;padding:12px 16px;border-radius:8px;border:2px solid var(--border);background:transparent;cursor:pointer;font-size:14px;font-weight:600;color:var(--text);transition:all .25s;width:100%}
  .toggle-done .dot{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .25s;flex-shrink:0}
  .toggle-done.checked{border-color:var(--green);background:rgba(63,185,80,.08)}.toggle-done.checked .dot{background:var(--green);border-color:var(--green)}
  .substeps{list-style:none;padding:0;display:flex;flex-direction:column;gap:6px}
  .substeps li{font-size:13px;color:var(--text-muted);padding-left:20px;position:relative;line-height:1.5}
  .substeps li::before{content:'';position:absolute;left:2px;top:7px;width:8px;height:8px;border-radius:50%;border:2px solid var(--border)}
  .stuck-toggle{background:none;border:none;color:var(--orange);font-size:13px;cursor:pointer;padding:4px 0;display:flex;align-items:center;gap:6px}.stuck-toggle:hover{text-decoration:underline}
  .stuck-content{max-height:0;overflow:hidden;transition:max-height .3s;font-size:13px;color:var(--text-muted);line-height:1.6}.stuck-content.open{max-height:500px}.stuck-content p{margin-top:8px}
  .copy-group{display:flex;flex-direction:column;gap:8px}
  .particle{position:fixed;width:8px;height:8px;border-radius:50%;pointer-events:none;z-index:999}
  .confetti{position:fixed;width:10px;height:16px;pointer-events:none;z-index:999;border-radius:2px}
  .rocket-anim{position:fixed;font-size:40px;z-index:999;pointer-events:none}
  .banner{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:rgba(240,241,243,.97);border:2px solid var(--green);border-radius:16px;padding:32px 56px;text-align:center;z-index:999;transition:transform .5s cubic-bezier(.175,.885,.32,1.275);box-shadow:0 12px 48px rgba(0,0,0,.15)}.banner.show{transform:translate(-50%,-50%) scale(1)}.banner h1{font-size:28px;margin-bottom:8px}.banner p{color:var(--text-muted);font-size:15px}
  .panel::-webkit-scrollbar{width:6px}.panel::-webkit-scrollbar-track{background:transparent}.panel::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  .credit{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;color:var(--text-muted);opacity:.6;pointer-events:none;letter-spacing:.3px;z-index:5}
  @media(max-width:768px){
    html,body{overflow:auto;height:auto}
    .top-bar{padding:0 12px;height:48px}
    .top-bar .title{font-size:13px}
    .progress-wrap{max-width:none;gap:6px}
    .progress-label{min-width:60px;font-size:12px}
    .btn-reset{padding:4px 8px;font-size:11px}
    :root{--top-bar:48px}
    .quest-map,.phase-label,.phase-divider,.path-svg{display:none!important}
    #mobileList{display:flex;flex-direction:column;padding:60px 16px 80px;gap:0}
    .m-phase-header{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:var(--text-muted);padding:20px 0 10px;opacity:.7}
    .m-phase-header:first-child{padding-top:0}
    .m-item{display:flex;align-items:center;gap:14px;padding:14px 0;position:relative;cursor:pointer}
    .m-item::before{content:'';position:absolute;left:24px;top:0;bottom:0;width:2px;background:var(--border);z-index:0}
    .m-item:last-child::before{bottom:50%}
    .m-phase-header+.m-item::before{top:50%}
    .m-node{width:48px;height:48px;border-radius:50%;background:#f0f1f3;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;position:relative;z-index:1;transition:all .3s}
    .m-item.complete .m-node{border-color:var(--green);background:rgba(63,185,80,.15)}
    .m-item.active .m-node{border-color:var(--blue);background:rgba(88,166,255,.1);box-shadow:0 0 12px rgba(88,166,255,.3)}
    .m-item.locked .m-node{opacity:.5}
    .m-text{flex:1;min-width:0}
    .m-text .m-title{font-size:15px;font-weight:600;color:var(--text)}
    .m-item.complete .m-title{color:var(--green)}
    .m-item.active .m-title{color:var(--blue)}
    .m-item.locked .m-title{color:var(--text-muted)}
    .m-text .m-time{font-size:12px;color:var(--text-muted)}
    .m-check{color:var(--green);font-size:18px;flex-shrink:0;opacity:0;transition:opacity .3s}
    .m-item.complete .m-check{opacity:1}
    .panel{width:100%;max-width:100%;border-left:none;border-radius:16px 16px 0 0;top:auto;bottom:0;max-height:85vh;transform:translateY(100%);box-shadow:0 -4px 24px rgba(0,0,0,.12)}.panel.open{transform:translateY(0)}
    .panel-header{padding:16px}.panel-body{padding:16px;gap:12px}
    .banner{padding:20px 24px}.banner h1{font-size:22px}.banner p{font-size:13px}
    .credit{position:relative;padding:20px 0;text-align:center;opacity:.6}
  }
  @media(min-width:769px){
    #mobileList{display:none}
  }
</style>
</head>
<body>
<div class="top-bar">
  <div class="title"><span>AIdeate Workshop</span> — Training Quest</div>
  <div class="progress-wrap"><div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0%"></div></div><div class="progress-label" id="progressLabel">0 of 18</div></div>
  <button class="btn-reset" onclick="resetProgress()">Reset Progress</button>
</div>
<div class="phase-label p1">🚀 Setup</div>
<div class="phase-label p2">🏢 Workshop Prep</div>
<div class="phase-label p3">💡 Ideation</div>
<div class="phase-label p4">📊 Evaluate & Export</div>
<div class="phase-divider d1"></div><div class="phase-divider d2"></div><div class="phase-divider d3"></div>
<div class="quest-map" id="questMap"><svg class="path-svg" id="pathSvg" preserveAspectRatio="none"></svg></div>
<div id="mobileList"></div>
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel"><div class="panel-header"><div class="emoji-big" id="panelEmoji"></div><div class="meta"><h2 id="panelTitle"></h2><div class="time" id="panelTime"></div></div><button class="panel-close" onclick="closePanel()">✕</button></div><div class="panel-body" id="panelBody"></div></div>
<div class="banner" id="banner"><h1>🏆 Quest Complete!</h1><p>You are now an AI Workshop Facilitator.<br>Go run your first customer workshop.</p></div>
<div class="credit">AIdeate Workshop — Training Quest · Built with 🔥 by BlazingBeard</div>

const STORAGE_KEY = 'quest-' + btoa('AIdeate Workshop').slice(0,12);
const PHASE_LABELS = ["\ud83d\ude80 Setup", "\ud83c\udfe2 Workshop Prep", "\ud83d\udca1 Ideation", "\ud83d\udcca Evaluate & Export"];
let state = loadState();

function isMobile(){return window.innerWidth<=768}
function loadState(){try{const s=localStorage.getItem(STORAGE_KEY);if(s)return JSON.parse(s)}catch(e){}return{completed:{}}}
function saveState(){localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
function isComplete(id){return !!state.completed[id]}
function completedCount(){return CHECKPOINTS.filter(c=>isComplete(c.id)).length}
function render(){renderPath();renderNodes();updateProgress()}
function updateProgress(){const n=completedCount(),t=CHECKPOINTS.length,p=Math.round(n/t*100);document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressLabel').textContent=n+' of '+t}
function getActiveIndex(){for(let i=0;i<CHECKPOINTS.length;i++){if(!isComplete(CHECKPOINTS[i].id))return i}return CHECKPOINTS.length}

function renderPath(){
  if(isMobile()){document.getElementById('pathSvg').innerHTML='';return}
  const svg=document.getElementById('pathSvg'),w=window.innerWidth,h=window.innerHeight-52;
  svg.setAttribute('viewBox','0 0 '+w+' '+h);let html='';
  const pts=POSITIONS.map(p=>({x:p.x/100*w,y:p.y/100*h}));
  const ai=getActiveIndex();
  for(let i=0;i<pts.length-1;i++){
    const a=pts[i],b=pts[i+1],cx1=a.x+(b.x-a.x)*.6,cy1=a.y,cx2=a.x+(b.x-a.x)*.4,cy2=b.y;
    const d='M'+a.x+','+a.y+' C'+cx1+','+cy1+' '+cx2+','+cy2+' '+b.x+','+b.y;
    const done=isComplete(CHECKPOINTS[i].id)&&isComplete(CHECKPOINTS[i+1].id);
    const partial=isComplete(CHECKPOINTS[i].id)&&!isComplete(CHECKPOINTS[i+1].id);
    const active=i===ai-1||i===ai;
    if(done)html+='<path d="'+d+'" fill="none" stroke="var(--green)" stroke-width="3" stroke-opacity=".5"/>';
    else if(partial||active)html+='<path d="'+d+'" fill="none" stroke="var(--blue)" stroke-width="2.5" stroke-opacity=".4" stroke-dasharray="8 6"><animate attributeName="stroke-dashoffset" from="28" to="0" dur="1.5s" repeatCount="indefinite"/></path>';
    else html+='<path d="'+d+'" fill="none" stroke="var(--border)" stroke-width="2" stroke-dasharray="6 8" stroke-opacity=".5"/>';
  }
  svg.innerHTML=html;
}

function renderNodes(){
  if(isMobile()){renderMobileList();return}
  document.querySelectorAll('.node').forEach(n=>n.remove());
  const map=document.getElementById('questMap'),ai=getActiveIndex();
  CHECKPOINTS.forEach((cp,i)=>{
    const pos=POSITIONS[i];if(!pos)return;
    const node=document.createElement('div');
    node.className='node';
    if(isComplete(cp.id))node.classList.add('complete');
    else if(i===ai)node.classList.add('active');
    node.style.left=pos.x+'%';node.style.top='calc('+pos.y+'% + 0px)';
    const isLocked=i>ai&&!isComplete(cp.id);
    node.innerHTML='<div class="ring"></div><div class="inner"><span class="emoji">'+(isLocked?'🔒':cp.emoji)+'</span><svg class="check-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><polyline points="4 12 10 18 20 6"/></svg>'+(isLocked?'<span class="lock"></span>':'')+'</div><div class="label">'+cp.title+'</div>';
    node.addEventListener('click',()=>openPanel(i));
    map.appendChild(node);
  });
}

function renderMobileList(){
  const list=document.getElementById('mobileList');list.innerHTML='';
  const ai=getActiveIndex();let lastPhase=0;
  CHECKPOINTS.forEach((cp,i)=>{
    if(cp.phase!==lastPhase){
      lastPhase=cp.phase;
      const hdr=document.createElement('div');hdr.className='m-phase-header';
      hdr.textContent=PHASE_LABELS[cp.phase-1]||'Phase '+cp.phase;
      list.appendChild(hdr);
    }
    const item=document.createElement('div');item.className='m-item';
    if(isComplete(cp.id))item.classList.add('complete');
    else if(i===ai)item.classList.add('active');
    else if(i>ai)item.classList.add('locked');
    const isLocked=i>ai&&!isComplete(cp.id);
    item.innerHTML='<div class="m-node">'+(isComplete(cp.id)?'<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="3" stroke-linecap="round"><polyline points="4 12 10 18 20 6"/></svg>':(isLocked?'🔒':cp.emoji))+'</div><div class="m-text"><div class="m-title">'+cp.title+'</div><div class="m-time">'+(cp.time?'⏱ '+cp.time:'')+'</div></div>';
    item.addEventListener('click',()=>openPanel(i));
    list.appendChild(item);
  });
}

let currentPanel=-1;
function openPanel(idx){
  currentPanel=idx;const cp=CHECKPOINTS[idx];
  document.getElementById('panelEmoji').textContent=cp.emoji;
  document.getElementById('panelTitle').textContent=cp.title;
  document.getElementById('panelTime').textContent=cp.time?'⏱ '+cp.time:'';
  let html='<div class="desc">'+cp.desc+'</div>';
  if(cp.substeps){html+='<ol class="substeps">';cp.substeps.forEach(s=>html+='<li>'+s+'</li>');html+='</ol>'}
  if(cp.copies){
    html+='<div class="copy-group">';
    cp.copies.forEach(c=>{html+='<div><div style="font-size:12px;color:var(--text-muted);margin-bottom:4px">'+c.label+'</div><div class="copy-block"><span class="copy-text">'+escHtml(c.text)+'</span><button class="copy-btn" onclick="copyText(this,\''+escAttr(c.text)+'\')" title="Copy">📋</button></div></div>'});
    html+='</div>';
  }
  if(cp.learn){html+='<div style="font-size:13px;color:var(--text-muted)">📚 <b>What you learn:</b> '+cp.learn+'</div>'}
  const checked=isComplete(cp.id);
  html+='<button class="toggle-done '+(checked?'checked':'')+'" onclick="toggleDone(\''+cp.id+'\',this)"><span class="dot">'+(checked?'<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><polyline points="4 12 10 18 20 6"/></svg>':'')+'</span><span>'+(cp.toggle||'Done ✓')+'</span></button>';
  if(cp.stuck){html+='<div><button class="stuck-toggle" onclick="this.nextElementSibling.classList.toggle(\'open\')">🆘 I\'m stuck</button><div class="stuck-content"><p>'+cp.stuck+'</p></div></div>'}
  document.getElementById('panelBody').innerHTML=html;
  document.getElementById('overlay').classList.add('open');
  document.getElementById('panel').classList.add('open');
}

function closePanel(){document.getElementById('overlay').classList.remove('open');document.getElementById('panel').classList.remove('open');currentPanel=-1}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function escAttr(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}

function copyText(btn,text){
  navigator.clipboard.writeText(text).then(()=>{
    btn.classList.add('copied');btn.textContent='✓';
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋'},1500);
  }).catch(()=>{
    const ta=document.createElement('textarea');ta.value=text;ta.style.cssText='position:fixed;left:-9999px';
    document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
    btn.classList.add('copied');btn.textContent='✓';
    setTimeout(()=>{btn.classList.remove('copied');btn.textContent='📋'},1500);
  });
}

function toggleDone(id,btn){
  if(isComplete(id)){delete state.completed[id];btn.classList.remove('checked');btn.querySelector('.dot').innerHTML=''}
  else{state.completed[id]=true;btn.classList.add('checked');btn.querySelector('.dot').innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><polyline points="4 12 10 18 20 6"/></svg>';celebrate(id)}
  saveState();render();
}

function celebrate(id){
  const idx=CHECKPOINTS.findIndex(c=>c.id===id);let x,y;
  if(isMobile()){const items=document.querySelectorAll('.m-item');if(items[idx]){const r=items[idx].getBoundingClientRect();x=r.left+r.width/2;y=r.top+r.height/2}else return}
  else{const pos=POSITIONS[idx];if(!pos)return;x=pos.x/100*window.innerWidth;y=pos.y/100*(window.innerHeight-52)+52}
  spawnParticles(x,y,12);
  for(let p=1;p<=4;p++){const phase=CHECKPOINTS.filter(c=>c.phase===p);if(phase.every(c=>isComplete(c.id))&&id===phase[phase.length-1].id)setTimeout(()=>rocketAnimation(),400)}
  if(completedCount()===CHECKPOINTS.length)setTimeout(()=>{confettiExplosion();showBanner()},600);
}

function spawnParticles(cx,cy,count){
  const colors=['#58a6ff','#3fb950','#d29922','#f778ba','#bc8cff'];
  for(let i=0;i<count;i++){
    const el=document.createElement('div');el.className='particle';
    el.style.left=cx+'px';el.style.top=cy+'px';el.style.background=colors[i%colors.length];
    document.body.appendChild(el);
    const angle=Math.random()*Math.PI*2,dist=40+Math.random()*60,dx=Math.cos(angle)*dist,dy=Math.sin(angle)*dist;
    el.animate([{transform:'translate(0,0) scale(1)',opacity:1},{transform:'translate('+dx+'px,'+dy+'px) scale(0)',opacity:0}],{duration:600+Math.random()*400,easing:'cubic-bezier(.4,0,.2,1)'}).onfinish=()=>el.remove();
  }
}

function rocketAnimation(){
  const el=document.createElement('div');el.className='rocket-anim';el.textContent='🚀';
  el.style.left='-50px';el.style.bottom='60%';document.body.appendChild(el);
  el.animate([{transform:'translate(0,0) rotate(-30deg)',opacity:1},{transform:'translate('+(window.innerWidth+100)+'px,-'+(window.innerHeight/2)+'px) rotate(-30deg)',opacity:.8}],{duration:1400,easing:'cubic-bezier(.25,.1,.25,1)'}).onfinish=()=>el.remove();
}

function confettiExplosion(){
  const colors=['#58a6ff','#3fb950','#d29922','#f778ba','#bc8cff','#f85149','#fff'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');el.className='confetti';
    el.style.background=colors[i%colors.length];el.style.left=Math.random()*window.innerWidth+'px';el.style.top='-20px';
    el.style.width=(6+Math.random()*8)+'px';el.style.height=(10+Math.random()*12)+'px';
    el.style.borderRadius=Math.random()>.5?'50%':'2px';document.body.appendChild(el);
    const x=(Math.random()-.5)*200,spin=Math.random()*720-360;
    el.animate([{transform:'translate(0,0) rotate(0deg)',opacity:1},{transform:'translate('+x+'px,'+(window.innerHeight+40)+'px) rotate('+spin+'deg)',opacity:.6}],{duration:2000+Math.random()*1500,easing:'cubic-bezier(.25,.1,.25,1)',delay:Math.random()*300}).onfinish=()=>el.remove();
  }
}

function showBanner(){const b=document.getElementById('banner');b.classList.add('show');setTimeout(()=>b.classList.remove('show'),4000)}
function resetProgress(){if(!confirm('Reset all progress? This cannot be undone.'))return;state={completed:{}};saveState();closePanel();render()}

render();
window.addEventListener('resize',()=>render());
</script>
</body>
</html>
