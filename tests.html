<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AIdeate Workshop Tests</title>
<style>
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e2e8f0; padding: 24px; }
h1 { color: #0078d4; margin-bottom: 16px; }
.test { padding: 8px 12px; margin: 4px 0; border-radius: 6px; font-size: .85rem; }
.pass { background: rgba(16,124,16,.15); border-left: 3px solid #107c10; }
.fail { background: rgba(209,52,56,.15); border-left: 3px solid #d13438; }
.running { background: rgba(0,120,212,.1); border-left: 3px solid #0078d4; }
.summary { margin-top: 20px; padding: 16px; border-radius: 8px; font-weight: 700; font-size: 1.1rem; }
.summary.all-pass { background: rgba(16,124,16,.2); color: #4ade80; }
.summary.has-fail { background: rgba(209,52,56,.2); color: #ef4444; }
button { background: #0078d4; color: #fff; border: none; padding: 8px 20px; border-radius: 6px; font-weight: 600; cursor: pointer; margin-bottom: 16px; }
</style>
</head>
<body>
<h1>AIdeate Workshop Tests</h1>
<button onclick="runTests()">Run All Tests</button>
<div id="results"></div>
<div id="summary"></div>

<script>
const results = [];
const container = document.getElementById('results');
const summaryEl = document.getElementById('summary');

function logTest(name, passed, detail) {
  results.push({ name, passed, detail });
  const div = document.createElement('div');
  div.className = `test ${passed ? 'pass' : 'fail'}`;
  div.textContent = `${passed ? 'PASS' : 'FAIL'} ${name}${detail ? ' — ' + detail : ''}`;
  container.appendChild(div);
}

function showSummary() {
  const passed = results.filter(r => r.passed).length;
  const failed = results.filter(r => !r.passed).length;
  summaryEl.className = `summary ${failed > 0 ? 'has-fail' : 'all-pass'}`;
  summaryEl.textContent = `${passed} passed, ${failed} failed out of ${results.length} tests`;
}

async function runTests() {
  container.innerHTML = '';
  results.length = 0;

  // ═══ 1. JSON Schema Tests (1–12) ═══
  const sampleState = {
    version: '1.0',
    sessionId: 'test-session-123',
    workshopName: 'Test Workshop',
    companyName: 'Test Corp',
    participants: [
      { id: 1001, name: 'Alice Smith', title: 'VP Engineering', initials: 'AS' },
      { id: 1002, name: 'Bob Jones', title: 'CTO', initials: 'BJ' }
    ],
    ideas: [
      { id: 2001, name: 'Sales Agent', dept: 'Sales', desc: 'Helps sellers prep', submitter: 'Alice Smith', votes: 3, voters: ['Alice', 'Bob', 'Charlie'] },
      { id: 2002, name: 'HR Bot', dept: 'HR', desc: 'Onboarding automation', submitter: 'Bob Jones', votes: 1, voters: ['Alice'] }
    ],
    phase: 'vote',
    timerSeconds: 180,
    demoSlides: [
      { label: 'Demo 1', url: 'https://example.com/demo1', visible: true },
      { label: 'Demo 2', url: '', visible: false },
      { label: '', url: '', visible: false },
      { label: '', url: '', visible: false }
    ],
    departments: ['Sales', 'HR', 'IT', 'Operations'],
    createdAt: '2026-04-09T12:00:00Z',
    exportedAt: '2026-04-09T13:00:00Z'
  };

  // Test 1: JSON serialization round-trip
  try {
    const json = JSON.stringify(sampleState, null, 2);
    const parsed = JSON.parse(json);
    logTest('JSON round-trip: serialize + parse', true);
  } catch (e) {
    logTest('JSON round-trip: serialize + parse', false, e.message);
  }

  // Test 2: Schema has all required fields
  const requiredFields = ['version', 'sessionId', 'workshopName', 'companyName', 'participants', 'ideas', 'phase', 'timerSeconds', 'demoSlides', 'departments', 'createdAt'];
  const missingFields = requiredFields.filter(f => !(f in sampleState));
  logTest('Schema: all required fields present', missingFields.length === 0, missingFields.length > 0 ? `Missing: ${missingFields.join(', ')}` : '11 fields');

  // Test 3: Participant structure
  const p = sampleState.participants[0];
  const pFields = ['id', 'name', 'title', 'initials'].every(f => f in p);
  logTest('Participant schema: id, name, title, initials', pFields);

  // Test 4: Idea structure
  const idea = sampleState.ideas[0];
  const iFields = ['id', 'name', 'dept', 'desc', 'submitter', 'votes', 'voters'].every(f => f in idea);
  logTest('Idea schema: all 7 fields present', iFields);

  // Test 5: Idea IDs are stable (not regenerated)
  const json = JSON.stringify(sampleState);
  const restored = JSON.parse(json);
  logTest('Stable IDs: idea IDs preserved after round-trip', restored.ideas[0].id === 2001 && restored.ideas[1].id === 2002);

  // Test 6: Participant IDs preserved
  logTest('Stable IDs: participant IDs preserved after round-trip', restored.participants[0].id === 1001);

  // Test 7: Votes and voters preserved
  logTest('Votes preserved: count + voter names', restored.ideas[0].votes === 3 && restored.ideas[0].voters.length === 3);

  // Test 8: DemoSlides as objects (not arrays)
  const ds = sampleState.demoSlides[0];
  logTest('DemoSlides: object with label, url, visible', 'label' in ds && 'url' in ds && 'visible' in ds);

  // Test 9: Empty state handling
  const emptyState = {
    version: '1.0', sessionId: '', workshopName: '', companyName: '',
    participants: [], ideas: [], phase: 'ideate', timerSeconds: 300,
    demoSlides: [{label:'',url:'',visible:false},{label:'',url:'',visible:false},{label:'',url:'',visible:false},{label:'',url:'',visible:false}],
    departments: [], createdAt: new Date().toISOString()
  };
  try {
    JSON.parse(JSON.stringify(emptyState));
    logTest('Empty state: valid JSON', true);
  } catch (e) {
    logTest('Empty state: valid JSON', false, e.message);
  }

  // Test 10: localStorage autosave + restore
  try {
    const key = 'aideate_test_' + Date.now();
    localStorage.setItem(key, JSON.stringify(sampleState));
    const restoredLS = JSON.parse(localStorage.getItem(key));
    logTest('localStorage: autosave + restore', restoredLS.workshopName === 'Test Workshop' && restoredLS.ideas.length === 2);
    localStorage.removeItem(key);
  } catch (e) {
    logTest('localStorage: autosave + restore', false, e.message);
  }

  // Test 11: localStorage size check (should handle typical workshop)
  try {
    const bigState = { ...sampleState };
    bigState.ideas = Array.from({ length: 100 }, (_, i) => ({
      id: i, name: `Idea ${i}`, dept: 'Sales', desc: 'Description '.repeat(20),
      submitter: 'User', votes: Math.floor(Math.random() * 10), voters: ['A', 'B', 'C']
    }));
    bigState.participants = Array.from({ length: 50 }, (_, i) => ({
      id: i, name: `Participant ${i}`, title: 'Title', initials: 'XX'
    }));
    const size = JSON.stringify(bigState).length;
    logTest('localStorage: handles large workshop (100 ideas, 50 participants)', size < 500000, `${(size/1024).toFixed(1)} KB`);
  } catch (e) {
    logTest('localStorage: handles large workshop', false, e.message);
  }

  // Test 12: Export Blob creation
  try {
    const blob = new Blob([JSON.stringify(sampleState, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    logTest('Export: Blob + ObjectURL creation', blob.size > 0 && url.startsWith('blob:'));
    URL.revokeObjectURL(url);
  } catch (e) {
    logTest('Export: Blob + ObjectURL creation', false, e.message);
  }

  // ═══ 2. Import / Export Tests (13–14) ═══

  // Test 13: Import validation — reject bad version
  try {
    const bad = { ...sampleState, version: '99.0' };
    const isValid = bad.version === '1.0';
    logTest('Import validation: reject wrong version', !isValid);
  } catch (e) {
    logTest('Import validation: reject wrong version', false, e.message);
  }

  // Test 14: Import — handle partial JSON with defaults
  try {
    const partial = { version: '1.0', workshopName: 'Partial' };
    const restoredPartial = {
      workshopName: partial.workshopName || '',
      companyName: partial.companyName || '',
      participants: partial.participants || [],
      ideas: partial.ideas || [],
      phase: partial.phase || 'ideate',
      timerSeconds: partial.timerSeconds || 300,
      demoSlides: partial.demoSlides || [{label:'',url:'',visible:false},{label:'',url:'',visible:false},{label:'',url:'',visible:false},{label:'',url:'',visible:false}],
      departments: partial.departments || ['Sales','Operations','HR','IT']
    };
    logTest('Import: handles partial JSON with defaults', restoredPartial.ideas.length === 0 && restoredPartial.phase === 'ideate' && restoredPartial.demoSlides.length === 4);
  } catch (e) {
    logTest('Import: handles partial JSON with defaults', false, e.message);
  }

  // ═══ 3. Unified App Structure Tests (15–21) ═══

  let appHtml = '';
  try {
    appHtml = await (await fetch('index.html')).text();
  } catch (e) {
    logTest('SETUP: Could not fetch index.html', false, e.message);
  }

  // Test 15: App contains drawer markup
  logTest('App: contains drawer markup (.drawer, .drawer-fab)', appHtml.includes('class="drawer"') && appHtml.includes('drawer-fab'));

  // Test 16: App contains all phase controls
  logTest('App: contains phase control buttons (ideate/vote/evaluate/prioritize)', appHtml.includes('setPhase') && appHtml.includes("'ideate'") && appHtml.includes("'vote'") && appHtml.includes("'evaluate'") && appHtml.includes("'prioritize'"));

  // Test 17: App contains idea management functions
  logTest('App: contains idea management (addIdea, removeIdea)', appHtml.includes('function addIdea') && appHtml.includes('function removeIdea'));

  // Test 18: App contains AI integration functions
  logTest('App: contains AI integration (aiFormatIdea, aiEvaluateIdea)', appHtml.includes('function aiFormatIdea') && appHtml.includes('function aiEvaluateIdea'));

  // Test 19: App contains evaluation functions
  logTest('App: contains evaluation (saveIdeaEvaluation, renderEvaluation)', appHtml.includes('function saveIdeaEvaluation') && appHtml.includes('function renderEvaluation'));

  // Test 20: App contains report generation
  logTest('App: contains report generation (generateReport)', appHtml.includes('function generateReport'));

  // Test 21: App contains timer functions
  logTest('App: contains timer functions (startTimer, stopTimer)', appHtml.includes('function startTimer') && appHtml.includes('function stopTimer'));

  // ═══ 4. No PII Tests (22–23) ═══

  // Test 22: No hardcoded company names in app
  {
    const hasHardcoded = /manpower|cargill|experis|nike|deloitte/i.test(appHtml);
    logTest('App: no hardcoded company names', !hasHardcoded);
  }

  // Test 23: Theme uses #0078d4 (MS Blue)
  logTest('Theme: app uses #0078d4 (MS Blue)', appHtml.includes('0078d4'));

  // ═══ 5. PWA Tests (24–37) ═══

  // Test 24: manifest.json is valid JSON
  try {
    const resp = await fetch('manifest.json');
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    await resp.json();
    logTest('PWA: manifest.json is valid JSON', true);
  } catch (e) {
    logTest('PWA: manifest.json is valid JSON', false, e.message);
  }

  // Test 25: manifest has required PWA fields
  try {
    const manifest = await (await fetch('manifest.json')).json();
    const required = ['name', 'short_name', 'start_url', 'display', 'icons', 'theme_color', 'background_color'];
    const missing = required.filter(f => !(f in manifest));
    logTest('PWA: manifest has all required fields', missing.length === 0, missing.length > 0 ? `Missing: ${missing.join(', ')}` : '7 fields');
  } catch (e) {
    logTest('PWA: manifest required fields', false, e.message);
  }

  // Test 26: manifest display is standalone (single window)
  try {
    const manifest = await (await fetch('manifest.json')).json();
    logTest('PWA: display is standalone', manifest.display === 'standalone', manifest.display);
  } catch (e) {
    logTest('PWA: display mode', false, e.message);
  }

  // Test 27: manifest theme_color is MS Blue
  try {
    const manifest = await (await fetch('manifest.json')).json();
    logTest('PWA: theme_color is #0078d4', manifest.theme_color === '#0078d4');
  } catch (e) {
    logTest('PWA: theme_color', false, e.message);
  }

  // Test 28: manifest has at least one icon
  try {
    const manifest = await (await fetch('manifest.json')).json();
    logTest('PWA: has icons array with entries', Array.isArray(manifest.icons) && manifest.icons.length > 0);
  } catch (e) {
    logTest('PWA: icons', false, e.message);
  }

  // Test 29: icon.svg is loadable and is SVG
  try {
    const resp = await fetch('icon.svg');
    const text = await resp.text();
    logTest('PWA: icon.svg loads and is SVG', resp.ok && text.includes('<svg'));
  } catch (e) {
    logTest('PWA: icon.svg', false, e.message);
  }

  // Test 30: sw.js is loadable and has install handler
  try {
    const resp = await fetch('sw.js');
    const text = await resp.text();
    logTest('PWA: sw.js loads and has install handler', resp.ok && text.includes("addEventListener('install'"));
  } catch (e) {
    logTest('PWA: sw.js', false, e.message);
  }

  // Test 31: Service worker registration succeeds
  try {
    if ('serviceWorker' in navigator) {
      const reg = await navigator.serviceWorker.register('sw.js');
      logTest('PWA: service worker registration succeeds', !!reg.scope);
      await reg.unregister();
    } else {
      logTest('PWA: service worker registration succeeds', false, 'serviceWorker not supported');
    }
  } catch (e) {
    logTest('PWA: service worker registration', false, e.message);
  }

  // Test 32: App file links manifest.json
  logTest('PWA: app links manifest.json', appHtml.includes('manifest.json'));

  // Test 33: App file has theme-color meta
  logTest('PWA: app has theme-color meta', appHtml.includes('theme-color'));

  // Test 34: App file registers sw.js
  logTest('PWA: app registers sw.js', appHtml.includes("register('sw.js')"));

  // Test 35: App file has download button (downloadAppZip)
  logTest('PWA: app has download function', appHtml.includes('downloadAppZip'));

  // Test 36: App file has install button (installPWA)
  logTest('PWA: app has install button', appHtml.includes('installBtn') && appHtml.includes('installPWA'));

  // Test 37: sw.js caches index.html but NOT control.html
  try {
    const sw = await (await fetch('sw.js')).text();
    const cachesIndex = sw.includes('index.html');
    const noControl = !sw.includes('control.html');
    logTest('PWA: sw.js caches index.html (no control.html)', cachesIndex && noControl);
  } catch (e) {
    logTest('PWA: SW cache list', false, e.message);
  }

  showSummary();
}
</script>
</body>
</html>
